# Manual trigger - run 1
[green_agent]
image = "ghcr.io/rdi-foundation/tau2-agentbeats:latest"
env = { LOG_LEVEL = "INFO", OPENAI_API_KEY = "${OPENAI_API_KEY}", GEMINI_API_KEY = "${GEMINI_API_KEY}", DEEPSEEK_API_KEY = "${DEEPSEEK_API_KEY}" }

[[participants]]
image = "ghcr.io/keer0205/tau2-purple-agent:latest"
name = "agent"
env = { LOG_LEVEL = "INFO", AGENT_LLM = "anthropic/claude-3-5-sonnet-20241022", ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY}" }

[config]
domain = "airline"
user_llm = "openai/gpt-4o-mini"
num_tasks = 1
