[green_agent]
image = "ghcr.io/rdi-foundation/tau2-agentbeats:latest"
env = { LOG_LEVEL = "INFO", CEREBRAS_API_KEY = "${CEREBRAS_API_KEY}", OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}" }

[[participants]]
image = "ghcr.io/nikiduki/agentx-competition:latest"
name = "agent"
env = {
  LOG_LEVEL = "INFO",
  AGENT_MODEL_CANDIDATES = "cerebras:qwen-3-235b-a22b-instruct-2507,openrouter:minimax/minimax-m2.5:free",
  AGENT_PROVIDER_PRIORITY = "cerebras,openrouter",
  AGENT_KEYS_INLINE = "${AGENT_KEYS_INLINE}",
  CEREBRAS_API_KEY = "${CEREBRAS_API_KEY}",
  OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}",
}

[config]
domain = "airline"
num_tasks = 3
max_steps = 80
user_llm = "cerebras/qwen-3-235b-a22b-instruct-2507"
